<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>og</title>
    <style>
      :root {
        --primary: #2d4a5e;
        --accent: #e07a5f;
        --cream: #f5f0e8;
        --blue-gray: #d5dfe5;
      }
      * { box-sizing: border-box; }
      html, body { margin: 0; padding: 0; }
      body {
        width: 1200px;
        height: 630px;
        background: var(--primary);
        color: var(--cream);
        font-family: ui-monospace, 'SF Mono', SFMono-Regular, Menlo, Monaco, Consolas, 'Liberation Mono', 'Courier New', monospace;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        overflow: hidden;
      }
      .frame {
        padding: 80px;
        width: 100%;
        height: 100%;
        display: flex;
        flex-direction: column;
        justify-content: center;
      }
      .about-label {
        font-size: 26px;
        color: rgba(245, 240, 232, 0.45);
        letter-spacing: 0.18em;
        margin-bottom: 56px;
      }
      .meta-row {
        display: flex;
        align-items: center;
        gap: 18px;
        margin-bottom: 40px;
      }
      .dot {
        width: 18px;
        height: 18px;
        border-radius: 9999px;
        background: var(--accent);
        display: inline-block;
      }
      .meta-text {
        font-size: 30px;
        color: rgba(245, 240, 232, 0.65);
        letter-spacing: 0.28em;
        font-weight: 600;
      }
      .title {
        font-size: 60px;
        font-weight: 700;
        line-height: 1.05;
        margin: 0 0 36px 0;
        color: var(--cream);
        white-space: nowrap;
      }
      .tagline {
        font-size: 36px;
        color: rgba(245, 240, 232, 0.82);
        margin: 0;
        line-height: 1.3;
      }
    </style>
  </head>
  <body>
    <div class="frame">
      <div class="about-label"># about.md</div>
      <div class="meta-row">
        <span class="dot"></span>
        <span class="meta-text">DEVOPS · THESSALONÍKI</span>
      </div>
      <h1 class="title">Thessaloníki DevOps Meetup</h1>
      <p class="tagline">Let's meet and discuss about everything DevOps!</p>
    </div>
  </body>
</html>
